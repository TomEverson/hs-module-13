app = "tomeverson17-gmail-com-harbour-classifier"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  MLFLOW_TRACKING_URI = "http://tomeverson17-gmail-com-harbour-mlflow.internal:5000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
