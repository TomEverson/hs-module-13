app = "tomeverson17-gmail-com-harbour-mlflow"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "mlflow_data"
  destination = "/mlflow"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
