app = "tomeverson17-gmail-com-harbour-compose"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # All services run on localhost inside the same container
  MLFLOW_TRACKING_URI = "http://localhost:5000"
  CLASSIFIER_URL      = "http://localhost:8001"
  LLM_URL             = "http://localhost:11434"
  OLLAMA_MODEL        = "smollm2:135m"
  # Store Ollama models on the persistent volume so they survive restarts
  OLLAMA_MODELS       = "/data/ollama_models"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source      = "app_data"
  destination = "/data"

[[vm]]
  memory   = "3gb"
  cpu_kind = "shared"
  cpus     = 2
