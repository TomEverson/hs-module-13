app = "tomeverson17-gmail-com-harbour-llm"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  OLLAMA_MODEL = "tinyllama"

[http_service]
  internal_port = 11434
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "ollama_cache"
  destination = "/root/.ollama"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
